name: test

on:
  pull_request:
  push:
    branches: [main, itamae-migration]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src/itamae --ignore-missing-imports
      - run: uv run pytest --cov=itamae --cov-branch --cov-report=term-missing
      - run: uv build

  tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        extras: ["", "astropy", "colossus", "full"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --group dev
      - if: matrix.extras != ''
        run: uv sync --locked --extra ${{ matrix.extras }} --group dev
      - run: uv run pytest

  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - run: uv venv .venv-smoke
      - run: uv pip install --python .venv-smoke/bin/python dist/*.whl
      - run: .venv-smoke/bin/python -c "import itamae; print(itamae.__version__)"
